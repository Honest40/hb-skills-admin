/* CLOUDINARY */
function upload(file){
  return new Promise((resolve, reject)=>{
    const xhr = new XMLHttpRequest();
    const fd = new FormData();

    fd.append("file", file);
    fd.append("upload_preset", "zedmarket");

    xhr.open("POST", "https://api.cloudinary.com/v1_1/dc5moeafv/auto/upload");

    xhr.upload.onprogress = (e)=>{
      if(e.lengthComputable){
        const percent = Math.round((e.loaded / e.total) * 100);

        document.getElementById("adminBar").style.width = percent + "%";
        document.getElementById("adminText").innerText = "Uploading " + percent + "%";
      }
    };
    

  xhr.onload = ()=>{
  if(xhr.status === 200){
    const res = JSON.parse(xhr.responseText);
    resolve(res.secure_url);
  } else {
    reject("Upload failed");
  }
};
    xhr.onerror = reject;

    xhr.send(fd);
  });
}

async function createCourse(btn){
  if(!courseTitle.value) return alert("Enter title");

  btn.disabled = true;
  btn.innerText = "Processing...";

  showAdminLoader();
  setLoader("Preparing upload...");

  let img="";
  const file = courseCover.files[0];

  try{
    if(file) img = await upload(file);

    setLoader("Saving course...");

    await db.collection("courses").add({
      title:courseTitle.value,
      description:courseDesc.value,
      price:Number(coursePrice.value||0),
      coverUrl:img,
      createdAt:Date.now()
    });

    document.getElementById("adminText").innerHTML = "✅ Completed Successfully";

    setTimeout(()=>{
      hideAdminLoader();
      btn.disabled = false;

      loadCourses();
    },500);

  }catch(e){
    hideAdminLoader();
    btn.disabled = false;
    btn.innerText = "Create Course";
    alert("Upload failed");
  }
}

function detectType(url){
  if(!url) return null;

  url = url.toLowerCase();

  if(url.match(/\.(mp4|webm|ogg)/)) return "video";
  if(url.match(/\.(jpg|jpeg|png|gif|webp)/)) return "image";

  return "url";
}

function enableDrag(){
  const container = document.getElementById("sortableLessons");
  let dragged = null;

  container.querySelectorAll(".lesson-item").forEach(item => {

    item.addEventListener("dragstart", () => {
      dragged = item;
      item.style.opacity = "0.4";
    });

    item.addEventListener("dragend", () => {
      item.style.opacity = "1";
      saveNewOrder();
    });

    item.addEventListener("dragover", (e) => {
      e.preventDefault();

      const afterElement = getDragAfterElement(container, e.clientY);
      if(afterElement == null){
        container.appendChild(dragged);
      } else {
        container.insertBefore(dragged, afterElement);
      }
    });

  });
}

/* SMART POSITION DETECTION */
function getDragAfterElement(container, y){
  const draggableElements = [...container.querySelectorAll(".lesson-item:not(.dragging)")];

  return draggableElements.reduce((closest, child) => {
    const box = child.getBoundingClientRect();
    const offset = y - box.top - box.height / 2;

    if(offset < 0 && offset > closest.offset){
      return { offset: offset, element: child };
    } else {
      return closest;
    }
  }, { offset: Number.NEGATIVE_INFINITY }).element;
}

/* SAVE ORDER (OPTIMIZED) */
async function saveNewOrder(){
  const courseId = courseSelect.value;
  const items = document.querySelectorAll(".lesson-item");

  let batch = db.batch();

  items.forEach((item, index)=>{
    const id = item.getAttribute("data-id");

    const ref = db.collection("courses")
      .doc(courseId)
      .collection("lessons")
      .doc(id);

    batch.update(ref, { order: index });
  });

  await batch.commit();

  toast("✅ Order saved!");
}

async function fixLessonOrder() {
  const courseId = courseSelect.value;
  if (!courseId) return alert("Select a course first");

  const snap = await db.collection("courses")
    .doc(courseId)
    .collection("lessons")
    .get();

  let i = 0;

  snap.forEach(doc => {
    db.collection("courses")
      .doc(courseId)
      .collection("lessons")
      .doc(doc.id)
      .update({ order: i++ });
  });

  alert("Lesson order fixed!");
}

async function editLesson(id){
  const courseId = courseSelect.value;

  const docRef = await db.collection("courses")
    .doc(courseId)
    .collection("lessons")
    .doc(id)
    .get();

  const d = docRef.data();

  const newTitle = prompt("Edit Title", d.title);
  const newDesc = prompt("Edit Description", d.description);

  let newUrl = d.url;

  const changeFile = confirm("Do you want to change image/video/file?");

  if(changeFile){
    const fileInput = document.createElement("input");
    fileInput.type = "file";

    fileInput.onchange = async (e)=>{
      const file = e.target.files[0];
      if(file){
        showAdminLoader();
        setLoader("Uploading new file...");

        newUrl = await upload(file);

        await db.collection("courses")
          .doc(courseId)
          .collection("lessons")
          .doc(id)
          .update({
            title: newTitle,
            description: newDesc,
            url: newUrl,
            type: detectType(newUrl)
          });

        hideAdminLoader();
        loadLessons();
        toast("Lesson updated ✅");
      }
    };

    fileInput.click();
    return;
  }

  await db.collection("courses")
    .doc(courseId)
    .collection("lessons")
    .doc(id)
    .update({
      title: newTitle,
      description: newDesc
    });

  loadLessons();
  toast("Lesson updated ✅");
}

async function deleteLesson(id){
  const courseId = courseSelect.value;

  if(!confirm("Delete this lesson?")) return;

  await db.collection("courses")
    .doc(courseId)
    .collection("lessons")
    .doc(id)
    .delete();

  loadLessons();
  toast("Lesson deleted 🗑");
}
