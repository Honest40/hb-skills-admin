<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HB Skills Academy ULTRA - Admin Portal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
:root{--green:#198754;--orange:#ff8c00;--dark:#0f2a44;}
body{margin:0;font-family:Arial,sans-serif;background:#f4f4f4;}
header{background:var(--dark);color:#fff;padding:15px;text-align:center;}
header div:first-child{font-size:24px;font-weight:bold;}
header div:last-child{font-size:14px;color:#fff;opacity:0.85;}
nav{display:none;gap:5px;background:var(--orange);padding:8px;flex-wrap:wrap;}
nav button{flex:1;border:none;padding:10px;color:#fff;border-radius:6px;font-size:15px;cursor:pointer;margin:2px;}
nav button.active{background:var(--green);}
section{display:none;padding:15px;}
input,textarea,select,button{width:100%;padding:10px;margin:6px 0;border-radius:6px;border:1px solid #ccc;}
button{background:var(--green);color:#fff;font-weight:bold;cursor:pointer;}
.card{background:#fff;border-radius:10px;padding:10px;margin:10px 0;box-shadow:0 2px 5px rgba(0,0,0,.1);}
img,video{width:100%;height:auto;max-height:300px;object-fit:contain;border-radius:8px;background:#eee;margin-top:10px;}
.badge{display:inline-block;background:var(--orange);color:#000;padding:3px 6px;border-radius:4px;font-size:12px;margin-left:4px;}
.approved{background:var(--green);color:#fff;}
.pending{background:#ffc107;color:#000;}
</style>
</head>
<body>

<header>
  <div>HB Skills Academy ULTRA</div>
  <div>Admin Portal</div>
</header>

<!-- Login -->
<section id="authBox">
  <h3>Admin Login</h3>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button id="loginBtn">Login</button>
</section>

<!-- Navigation -->
<nav id="nav">
  <button data-tab="enrollments" class="active">Pending Enrollments</button>
  <button data-tab="courses">Courses</button>
  <button id="logout">Logout</button>
</nav>

<!-- Pending Enrollments -->
<section id="enrollments">
  <h3>Pending Enrollments</h3>
  <div id="pendingList">Loading...</div>
</section>

<!-- Courses -->
<section id="courses">
  <h3>Manage Courses</h3>
  <input id="newCourseTitle" placeholder="Course Title">
  <textarea id="newCourseDesc" placeholder="Course Description"></textarea>
  <input id="newCoursePrice" type="number" placeholder="Price (K)">
  <button id="addCourse">Add Course</button>
  <div id="courseList">Loading...</div>
</section>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

<script>
// Firebase Init
firebase.initializeApp({
  apiKey:"AIzaSyDhRFgn7nXoZlRf-GX7XakwUYrEMFZDgrI",
  authDomain:"pa-mwera.firebaseapp.com",
  projectId:"pa-mwera",
  storageBucket:"pa-mwera.appspot.com"
});

const auth=firebase.auth();
const db=firebase.firestore();
const storage=firebase.storage();

/* Elements */
const authBox=document.getElementById("authBox");
const nav=document.getElementById("nav");
const email=document.getElementById("email");
const password=document.getElementById("password");
const pendingList=document.getElementById("pendingList");
const courseList=document.getElementById("courseList");
const newCourseTitle=document.getElementById("newCourseTitle");
const newCourseDesc=document.getElementById("newCourseDesc");
const newCoursePrice=document.getElementById("newCoursePrice");

/* NAVIGATION */
function show(id){
  document.querySelectorAll("section").forEach(s=>s.style.display="none");
  document.getElementById(id).style.display="block";
  document.querySelectorAll("nav button").forEach(b=>b.classList.remove("active"));
  const btn=document.querySelector(`nav button[data-tab="${id}"]`);
  if(btn) btn.classList.add("active");
}
document.querySelectorAll("nav button[data-tab]").forEach(b=>b.onclick=()=>show(b.dataset.tab));

/* LOGIN */
document.getElementById("loginBtn").onclick=async()=>{
  try{
    const userCred=await auth.signInWithEmailAndPassword(email.value,password.value);
    const u=userCred.user;
    const doc=await db.collection("users").doc(u.uid).get();
    if(!doc.exists||doc.data().role!=="admin") throw "Not an admin!";
    authBox.style.display="none";
    nav.style.display="flex";
    show("enrollments");
    loadPendingEnrollments();
    loadCourses();
  }catch(e){
    alert(e);
  }
}
document.getElementById("logout").onclick=()=>auth.signOut();

/* PENDING ENROLLMENTS */
async function loadPendingEnrollments(){
  const snap=await db.collection("enrollments").where("approved","==",false).get();
  pendingList.innerHTML="";
  if(snap.empty){pendingList.innerHTML="<p>No pending enrollments</p>"; return;}
  snap.forEach(async doc=>{
    const d=doc.data();
    const userDoc=await db.collection("users").doc(d.userId).get();
    const userName=userDoc.exists?userDoc.data().fullName:"Unknown";
    pendingList.innerHTML+=`<div class="card">
      <strong>${userName}</strong><br>
      Payment: ${d.paymentMethod}<br>
      <a href="${d.paymentProof}" target="_blank">View Proof</a><br>
      <button onclick="approve('${doc.id}')">Approve</button>
      <button onclick="reject('${doc.id}')">Reject</button>
    </div>`;
  });
}
async function approve(id){await db.collection("enrollments").doc(id).update({approved:true}); loadPendingEnrollments();}
async function reject(id){await db.collection("enrollments").doc(id).delete(); loadPendingEnrollments();}

/* COURSES */
document.getElementById("addCourse").onclick=async()=>{
  const title=newCourseTitle.value.trim();
  const desc=newCourseDesc.value.trim();
  const price=Number(newCoursePrice.value);
  if(!title||!desc||!price) return alert("Fill all fields");
  await db.collection("courses").add({title,description:desc,price,lessons:[]});
  newCourseTitle.value=""; newCourseDesc.value=""; newCoursePrice.value="";
  loadCourses();
}
async function loadCourses(){
  const snap=await db.collection("courses").get();
  courseList.innerHTML="";
  if(snap.empty) courseList.innerHTML="<p>No courses yet</p>";
  snap.forEach(doc=>{
    const d=doc.data();
    courseList.innerHTML+=`<div class="card">
      <strong>${d.title}</strong> (${d.price?`K${d.price}`:'Free'})<br>${d.description}
    </div>`;
  });
}

/* AUTH STATE */
auth.onAuthStateChanged(user=>{
  if(user){
    db.collection("users").doc(user.uid).get().then(doc=>{
      if(!doc.exists||doc.data().role!=="admin") auth.signOut();
      else {authBox.style.display="none"; nav.style.display="flex"; show("enrollments"); loadPendingEnrollments(); loadCourses();}
    });
  }
});
</script>
</body>
</html>
