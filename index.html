<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HB Skills Academy - Admin Portal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

:root{
--green:#198754;
--orange:#ff8c00;
--dark:#0f2a44;
}

body{
margin:0;
font-family:Arial;
background:#f4f4f4;
}

header{
background:var(--dark);
color:white;
padding:15px;
text-align:center;
}

nav{
display:flex;
gap:5px;
background:var(--orange);
padding:8px;
flex-wrap:wrap;
}

nav button{
flex:1;
border:none;
padding:10px;
color:white;
border-radius:6px;
cursor:pointer;
}

nav button.active{
background:var(--green);
}

section{
display:none;
padding:15px;
}

input,textarea,select{
width:100%;
padding:10px;
margin:6px 0;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:var(--green);
color:white;
padding:10px;
border:none;
border-radius:6px;
cursor:pointer;
margin-top:5px;
}

.card{
background:white;
padding:10px;
border-radius:10px;
margin:10px 0;
box-shadow:0 2px 5px rgba(0,0,0,.1);
}

img,video{
max-width:200px;
display:block;
margin-top:10px;
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
}

.modal-content{
background:white;
padding:20px;
border-radius:10px;
width:90%;
max-width:500px;
}

.close-btn{
float:right;
cursor:pointer;
color:red;
}

</style>
</head>

<body>

<header>
<h2>HB Skills Academy</h2>
Admin Portal
</header>

<section id="authBox">
<h3>Admin Login</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button id="loginBtn">Login</button>
</section>

<nav id="nav" style="display:none">

<button data-tab="students">Enrollments</button>
<button data-tab="courses">Courses</button>
<button data-tab="lessons">Lessons</button>
<button data-tab="users">Users</button>
<button id="logout">Logout</button>

</nav>

<section id="students">
<h3>Pending Enrollments</h3>
<div id="pendingEnrollments"></div>
</section>

<section id="courses">

<h3>Courses</h3>

<input id="newCourseTitle" placeholder="Course Title">
<textarea id="newCourseDesc" placeholder="Course Description"></textarea>

<button id="addCourse">Add Course</button>

<div id="courseList"></div>

</section>

<section id="lessons">

<h3>Lessons</h3>

<select id="courseSelect">
<option value="">Select Course</option>
</select>

<input id="newLessonTitle" placeholder="Lesson Title">

<textarea id="newLessonTheory" placeholder="Lesson Content"></textarea>

<input type="file" id="lessonImage">

<input type="file" id="lessonVideo">

<button id="addLesson">Add Lesson</button>

<div id="lessonList"></div>

</section>

<section id="users">

<h3>All Users</h3>

<input id="searchUser" placeholder="Search users">

<div id="userList"></div>

</section>

<div id="editModal" class="modal">

<div class="modal-content">

<span class="close-btn" id="closeModal">X</span>

<h3 id="modalTitle"></h3>

<input id="modalInput1">

<textarea id="modalInput2"></textarea>

<button id="saveModal">Save</button>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>

firebase.initializeApp({
apiKey:"AIzaSyDhRFgn7nXoZlRf-GX7XakwUYrEMFZDgrI",
authDomain:"pa-mwera.firebaseapp.com",
projectId:"pa-mwera"
});

const auth=firebase.auth();
const db=firebase.firestore();

const nav=document.getElementById("nav");

function show(id){
document.querySelectorAll("section").forEach(s=>s.style.display="none");
document.getElementById(id).style.display="block";
}

document.querySelectorAll("nav button[data-tab]").forEach(btn=>{
btn.onclick=()=>show(btn.dataset.tab)
});

loginBtn.onclick=async()=>{

try{

const user=await auth.signInWithEmailAndPassword(email.value,password.value);

const doc=await db.collection("users").doc(user.user.uid).get();

if(doc.data().role!="admin") throw "Not admin";

nav.style.display="flex";
authBox.style.display="none";

show("students");

loadUsers();
loadCourses();
loadPendingEnrollments();

}catch(e){

alert("Login failed or test mode");

nav.style.display="flex";
authBox.style.display="none";

show("students");

loadUsers();
loadCourses();
loadPendingEnrollments();

}

}

logout.onclick=()=>auth.signOut();

async function loadUsers(search=""){

const snap=await db.collection("users").get();

userList.innerHTML="";

snap.forEach(doc=>{

const d=doc.data();

const text=(d.fullName+" "+d.email+" "+d.contact+" "+d.location).toLowerCase();

if(search && !text.includes(search.toLowerCase())) return;

userList.innerHTML+=`

<div class="card">

<b>${d.fullName}</b>

<br>Email: ${d.email||""}

<br>Phone: ${d.contact||""}

<br>Gender: ${d.gender||""}

<br>Location: ${d.location||""}

<br>Role: ${d.role||""}

<br>

<button onclick="editUser('${doc.id}')">Edit</button>

<button onclick="deleteUser('${doc.id}')">Delete</button>

</div>

`;

});

}

searchUser.oninput=e=>loadUsers(e.target.value);

async function deleteUser(id){

if(confirm("Delete user?")){

await db.collection("users").doc(id).delete();

loadUsers();

}

}

async function loadCourses(){

const snap=await db.collection("courses").get();

courseList.innerHTML="";
courseSelect.innerHTML='<option value="">Select Course</option>';

snap.forEach(doc=>{

const d=doc.data();

courseList.innerHTML+=`

<div class="card">

<b>${d.title}</b>

<br>${d.description}

<br>

<button onclick="deleteCourse('${doc.id}')">Delete</button>

</div>

`;

courseSelect.innerHTML+=`<option value="${doc.id}">${d.title}</option>`;

});

}

addCourse.onclick=async()=>{

await db.collection("courses").add({

title:newCourseTitle.value,
description:newCourseDesc.value,
lessons:[]

});

newCourseTitle.value="";
newCourseDesc.value="";

loadCourses();

}

async function deleteCourse(id){

if(confirm("Delete course?")){

await db.collection("courses").doc(id).delete();

loadCourses();

}

}

courseSelect.onchange=loadLessons;

async function loadLessons(){

const courseId=courseSelect.value;

if(!courseId) return;

const doc=await db.collection("courses").doc(courseId).get();

const lessons=doc.data().lessons||[];

lessonList.innerHTML="";

lessons.forEach((l,i)=>{

lessonList.innerHTML+=`

<div class="card">

<b>${l.title}</b>

<br>${l.theory}

${l.image?`<img src="${l.image}">`:""}

${l.video?`<video controls src="${l.video}"></video>`:""}

<br>

<button onclick="deleteLesson('${courseId}',${i})">Delete</button>

</div>

`;

});

}

addLesson.onclick=async()=>{

const courseId=courseSelect.value;

let img="",vid="";

if(lessonImage.files[0]){

const fd=new FormData();

fd.append("file",lessonImage.files[0]);
fd.append("upload_preset","zedmarket");

const r=await fetch("https://api.cloudinary.com/v1_1/dc5moeafv/image/upload",{method:"POST",body:fd});

const d=await r.json();

img=d.secure_url;

}

if(lessonVideo.files[0]){

const fd2=new FormData();

fd2.append("file",lessonVideo.files[0]);
fd2.append("upload_preset","zedmarket");

const r2=await fetch("https://api.cloudinary.com/v1_1/dc5moeafv/video/upload",{method:"POST",body:fd2});

const d2=await r2.json();

vid=d2.secure_url;

}

const doc=await db.collection("courses").doc(courseId).get();

const lessons=doc.data().lessons||[];

lessons.push({

title:newLessonTitle.value,
theory:newLessonTheory.value,
image:img,
video:vid

});

await db.collection("courses").doc(courseId).update({lessons});

newLessonTitle.value="";
newLessonTheory.value="";
lessonImage.value="";
lessonVideo.value="";

loadLessons();

}

async function deleteLesson(courseId,index){

const doc=await db.collection("courses").doc(courseId).get();

const lessons=doc.data().lessons;

lessons.splice(index,1);

await db.collection("courses").doc(courseId).update({lessons});

loadLessons();

}

async function loadPendingEnrollments(){

try{

const snap=await db.collection("enrollments").where("approved","==",false).get();

pendingEnrollments.innerHTML="";

snap.forEach(doc=>{

const d=doc.data();

pendingEnrollments.innerHTML+=`

<div class="card">

User: ${d.userId}

<br>Payment: ${d.paymentMethod}

<br>

<button onclick="approve('${doc.id}')">Approve</button>

<button onclick="reject('${doc.id}')">Reject</button>

</div>

`;

});

}catch{}

}

async function approve(id){

await db.collection("enrollments").doc(id).update({approved:true});

loadPendingEnrollments();

}

async function reject(id){

await db.collection("enrollments").doc(id).delete();

loadPendingEnrollments();

}

</script>

</body>
</html>
