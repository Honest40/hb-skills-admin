<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LMS ADMIN PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family:Arial;
  background:#0f172a;
  color:white;
  padding:20px;
}

.card{
  background:#1e293b;
  padding:15px;
  border-radius:10px;
  margin-top:10px;
}

input, textarea, select{
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:6px;
  border:none;
}

button{
  margin-top:10px;
  padding:10px;
  width:100%;
  border:none;
  border-radius:6px;
  background:#2563eb;
  color:white;
  cursor:pointer;
}
button:hover{background:#1d4ed8}

nav button{
  width:auto;
  margin-right:5px;
}

img, video{
  width:100%;
  border-radius:10px;
  margin-top:10px;
}

#adminBar{
  transition: width 0.3s ease;
}
</style>
</head>

<body>
    
    <div id="adminLoader" style="
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.8);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
  flex-direction:column;
  color:#fff;
">
  <div style="width:250px;background:#333;height:10px;border-radius:10px;overflow:hidden;">
    <div id="adminBar" style="width:0%;height:100%;background:#22c55e;"></div>
  </div>
  <p id="adminText" style="margin-top:10px;">Uploading...</p>
</div>

<h2>🔥 LMS ADMIN PRO (FULL SYSTEM)</h2>

<!-- DASHBOARD -->
<div class="card">
  <h3>📊 Dashboard</h3>
  <div id="stats"></div>
</div>

<nav>
<button onclick="showTab('courses')">Courses</button>
<button onclick="showTab('lessons')">Lessons</button>
<button onclick="showTab('quiz')">Quiz</button>
<button onclick="showTab('payments')">Payments</button>
<button onclick="showTab('users')">Users</button>
</nav>

<!-- COURSES -->
<div id="courses" class="card">
<h3>Create Course</h3>

<input id="courseTitle" placeholder="Title">
<textarea id="courseDesc" placeholder="Description"></textarea>
<input id="coursePrice" type="number" placeholder="Price">
<input type="file" id="courseCover">

<button onclick="createCourse(this)">Create Course</button>

<div id="courseList"></div>
</div>

<!-- LESSONS -->
<div id="lessons" class="card" style="display:none;">
<h3>Add Lesson</h3>

<select id="courseSelect"></select>

<input id="lessonTitle" placeholder="Lesson Title">
<textarea id="lessonDesc" placeholder="Description"></textarea>

<select id="lessonType">
<option value="video">Video</option>
<option value="image">Image</option>
<option value="url">URL</option>
</select>

<input type="file" id="lessonFile">
<input id="lessonUrl" placeholder="External URL">

<button onclick="addLesson(this)">Add Lesson</button>

<div id="lessonList"></div>
</div>

<!-- QUIZ -->
<div id="quiz" class="card" style="display:none;">
<h3>Create Quiz</h3>

<select id="quizCourse"></select>
<input id="quizQuestion" placeholder="Question">
<input id="quizA" placeholder="A">
<input id="quizB" placeholder="B">
<input id="quizC" placeholder="C">
<input id="quizD" placeholder="D">
<input id="quizAnswer" placeholder="Correct Answer (A/B/C/D)">

<button onclick="addQuiz()">Add Quiz</button>
</div>

<!-- PAYMENTS -->
<div id="payments" class="card" style="display:none;">
<h3>Payments</h3>
<div id="paymentsList"></div>
</div>

<!-- USERS -->
<div id="users" class="card" style="display:none;">
<h3>Users</h3>
<div id="usersList"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyDhRFgn7nXoZlRf-GX7XakwUYrEMFZDgrI",
  authDomain:"pa-mwera.firebaseapp.com",
  projectId:"pa-mwera"
});

const db = firebase.firestore();

/* CLOUDINARY */
function upload(file){
  return new Promise((resolve, reject)=>{
    const xhr = new XMLHttpRequest();
    const fd = new FormData();

    fd.append("file", file);
    fd.append("upload_preset", "zedmarket");

    xhr.open("POST", "https://api.cloudinary.com/v1_1/dc5moeafv/auto/upload");

    xhr.upload.onprogress = (e)=>{
      if(e.lengthComputable){
        const percent = Math.round((e.loaded / e.total) * 100);

        document.getElementById("adminBar").style.width = percent + "%";
        document.getElementById("adminText").innerText = "Uploading " + percent + "%";
      }
    };

  xhr.onload = ()=>{
  if(xhr.status === 200){
    const res = JSON.parse(xhr.responseText);
    resolve(res.secure_url);
  } else {
    reject("Upload failed");
  }
};
    xhr.onerror = reject;

    xhr.send(fd);
  });
}
/* NAV */
function showTab(id){
  const sections=["courses","lessons","quiz","payments","users"];
  sections.forEach(s=>{
    document.getElementById(s).style.display = (s===id) ? "block" : "none";
  });
}

/* LOAD ALL */
window.onload = () => {
  loadAll();
};

/* STATS */
async function loadStats(){
  const c = await db.collection("courses").get();
  const u = await db.collection("users").get();
  const e = await db.collection("enrollments").get();

  document.getElementById("stats").innerHTML=`
    Courses: ${c.size}<br>
    Users: ${u.size}<br>
    Enrollments: ${e.size}
  `;
}

/* COURSES */
async function createCourse(btn){
  if(!courseTitle.value) return alert("Enter title");

  btn.disabled = true;
  btn.innerText = "Processing...";

  showAdminLoader();
  setLoader("Preparing upload...");
  btn.disabled = false;
btn.innerText = "Create Course";
  let img="";
  const file = courseCover.files[0];

  try{
    if(file) img = await upload(file);

    setLoader("Saving course...");

    await db.collection("courses").add({
      title:courseTitle.value,
      description:courseDesc.value,
      price:Number(coursePrice.value||0),
      coverUrl:img,
      createdAt:Date.now()
    });

   document.getElementById("adminText").innerHTML = "✅ Completed Successfully";

    setTimeout(()=>{
      hideAdminLoader();
      alert("Course created!");
      loadCourses();
    },500);

  }catch(e){
    hideAdminLoader();
    alert("Upload failed");
  }
}

async function loadCourses(){
  const snap = await db.collection("courses").get();

  courseList.innerHTML="";
  courseSelect.innerHTML="";
  quizCourse.innerHTML="";

  snap.forEach(doc=>{
    const d=doc.data();

    courseSelect.innerHTML+=`<option value="${doc.id}">${d.title}</option>`;
    quizCourse.innerHTML+=`<option value="${doc.id}">${d.title}</option>`;

    courseList.innerHTML+=`
      <div class="card">
        ${d.coverUrl ? `<img src="${d.coverUrl}">` : ""}
        <h4>${d.title}</h4>
        <p>${d.description}</p>
        <b>${d.price>0?"K"+d.price:"FREE"}</b>

        <button onclick="deleteCourse('${doc.id}')">Delete</button>
        <button onclick="editCourse('${doc.id}','${d.title}','${d.description}',${d.price})">Edit</button>
      </div>
    `;
  });

  loadStats();
}

/* EDIT COURSE */
async function editCourse(id,t,d,p){
  const nt = prompt("Title",t);
  const nd = prompt("Desc",d);
  const np = prompt("Price",p);

  await db.collection("courses").doc(id).update({
    title:nt,
    description:nd,
    price:Number(np)
  });

  loadCourses();
}

async function deleteCourse(id){
  await db.collection("courses").doc(id).delete();
  loadCourses();
}

/* LESSONS */
async function addLesson(btn){
  const courseId = courseSelect.value;

  if(!lessonTitle.value) return alert("Enter lesson title");

  btn.disabled = true;
  btn.innerText = "Uploading...";
  
  btn.disabled = false;
btn.innerText = "Add Lesson";

  let url="";
  const file = lessonFile.files[0];

  try{

    if(file){
      url = await upload(file);
    } else {
      url = lessonUrl.value;
    }

    if(!url){
      hideAdminLoader();
      return alert("Add file or URL");
    }

    const type = detectType(url);

    setLoader("Saving lesson...");

    await db.collection("courses")
      .doc(courseId)
      .collection("lessons")
      .add({
        title:lessonTitle.value,
        description:lessonDesc.value,
        type:type,
        url:url,
        createdAt:Date.now()
      });

   document.getElementById("adminText").innerHTML = "✅ Lesson Uploaded";

    setTimeout(()=>{
      hideAdminLoader();
      alert("Lesson added!");
      loadLessons();
    },500);

  }catch(e){
    hideAdminLoader();
    alert("Upload failed");
  }
}
/* LOAD LESSONS */
async function loadLessons(){
  const courseId = courseSelect.value;
  if(!courseId) return;

  const snap = await db.collection("courses").doc(courseId).collection("lessons").get();

  let html="";

  snap.forEach(doc=>{
    const d=doc.data();

    html+=`
  <div class="card">
    <b>${d.title}</b>
    <p>${d.description||""}</p>

    ${
      d.type === "video"
      ? `<video controls src="${d.url}"></video>`
      : d.type === "image"
      ? `<img src="${d.url}">`
      : `<a href="${d.url}" target="_blank">Open Link</a>`
    }

  </div>
`;
  });

  document.getElementById("lessonList").innerHTML=html;
}

/* QUIZ */
async function addQuiz(){
  await db.collection("courses")
  .doc(quizCourse.value)
  .collection("quizzes")
  .add({
    question:quizQuestion.value,
    A:quizA.value,
    B:quizB.value,
    C:quizC.value,
    D:quizD.value,
    answer:quizAnswer.value.toUpperCase(),
    createdAt:Date.now()
  });

  alert("Quiz added");
}

/* PAYMENTS */
async function loadPayments(){
  const snap = await db.collection("enrollments").get();

  paymentsList.innerHTML="";

  snap.forEach(doc=>{
    const d=doc.data();

    paymentsList.innerHTML+=`
      <div class="card">
        <b>${d.senderName||"No name"}</b>
        <p>Status: ${d.approved?"APPROVED":"PENDING"}</p>
${
  d.paymentProof
  ? (
      d.paymentProof.includes(".mp4")
      ? `<video controls src="${d.paymentProof}"></video>`
      : `<img src="${d.paymentProof}">`
    )
  : ""
}

        <button onclick="approve('${doc.id}')">Approve</button>
        <button onclick="reject('${doc.id}')">Reject</button>
      </div>
    `;
  });
}

/* USERS (FIXED CLEAN VIEW) */
async function loadUsers(){
  const snap = await db.collection("users").get();

  usersList.innerHTML="";

  for(const doc of snap.docs){
    const u = doc.data();

    const enr = await db.collection("enrollments")
      .where("userId","==",doc.id).get();

    let list="";
    enr.forEach(e=>{
      list += `<li>${e.data().courseId} - ${e.data().approved?"Approved":"Pending"}</li>`;
    });

    usersList.innerHTML+=`
      <div class="card">
       <b>Email:</b> ${u.email || "No email"}<br>
        <b>Name:</b> ${u.name||""}<br>
        <b>Phone:</b> ${u.phone||""}<br>
        <b>Bio:</b> ${u.bio||""}
        <h4>Courses</h4>
        <ul>${list}</ul>
      </div>
    `;
  }
}

/* LOAD ALL */
async function loadAll(){
  loadCourses();
  loadPayments();
  loadUsers();
  loadStats();
}

function showAdminLoader(){
  document.getElementById("adminLoader").style.display = "flex";
}

function hideAdminLoader(){
  document.getElementById("adminLoader").style.display = "none";
  document.getElementById("adminBar").style.width = "0%";
  document.getElementById("adminText").innerText = "Uploading...";
}

function detectType(url){
  if(!url) return null;

  url = url.toLowerCase();

  if(url.match(/\.(mp4|webm|ogg)/)) return "video";
  if(url.match(/\.(jpg|jpeg|png|gif|webp)/)) return "image";

  return "url";
}

function setLoader(text){
  document.getElementById("adminText").innerText = text;
}

async function approve(id){
  showAdminLoader();
  setLoader("Approving payment...");

  await db.collection("enrollments").doc(id).update({approved:true});

  hideAdminLoader();
  loadPayments();
}

async function reject(id){
  showAdminLoader();
  setLoader("Rejecting...");

  await db.collection("enrollments").doc(id).delete();

  hideAdminLoader();
  loadPayments();
}

courseSelect.onchange = loadLessons;

setLoader("Finalizing...");
</script>

</body>
</html>
